<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grêmio - Associação</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <header>
        <img src="./src/banner.jpg" alt="foto da torcida gremista no estádio" />
      </header>
      <div class="conteudo_central">
        <nav>
        <ul>
          <li class="itens_nav"><a href="./index.html">O Clube</a></li>
          <li class="itens_nav"><a href="./governanca.html">Governança</a></li>
          <li class="itens_nav"><a href="./futebol.html">Futebol</a></li>
          <li class="itens_nav"><a href="./competicoes.html">Competições</a></li>
          <li class="itens_nav"><a href="./associacao.html">Associe-se</a></li>
        </ul>
      </nav>
      <main>
        <h2>Cadastre-se</h2>
        <hr>
        <form action="processamento.php" method="get">
            <label for="cpf">CPF: </label>
            <input type="text" name="cpf" id="cpf" placeholder="Digite o CPF..."  size="30" maxlength="11" minlength="11">
            <br><br>
            <label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome..." size="50" maxlength="100" minlength="10">
            <br><br>
            <label for="data_nascimento">Data de Nascimento: </label>
            <input type="date" name="data_nascimento" id="data_nascimento" size="10">
            <br><br>
            <label for="peso">Peso: </label>
            <input type="number" name="peso" id="peso" size="10" step="0.01">
            <br><br>
            <fieldset>
                <legend>Sexo:</legend>
                <input type="radio" name="sexo" id="sexof" value="F"><label for="sexof">Feminino</label>
                <input type="radio" name="sexo" id="sexom" value="M"><label for="sexom">Masculino</label>
                <input type="radio" name="sexo" id="sexoni" value="N"> <label for="sexoni">Não identificar</label>
            </fieldset>
            <br><br>
            <fieldset>
                <legend>Preferências: </legend>
                <input type="checkbox" name="esporte" id="esportef" value="F"><label for="esportef">Futebol</label>
                <input type="checkbox" name="esporte" id="esporteb" value="B"><label for="esporteb">Basquete</label>
                <input type="checkbox" name="esporte" id="esportev" value="V"><label for="esportev">Vôlei</label>
            </fieldset>
            <br><br>
            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" size="20">
            <br><br>
            <input type="submit" name="acao" id="acao1" value="Salvar">
            <input type="reset" name="acao" id="acao2" value="Limpar">
        </form>
      </main>
      <aside>
        <div>
          <h3>Próximo jogo</h3>
          <hr />
          <p>Grêmio X Bragantino</p>
        </div>
        <div>
          <h3>Último Jogo</h3>
          <hr />
          <p>Cuiabá 1 X 2 Grêmio</p>
          <a href="https://gremio.net">Ingressos Aqui</a>
        </div>
      </aside>
      </div>
      <footer>
        <img src="./src/Gremio_logo.png" alt="Escudo do Grêmio" />
        <div class="footer_txt">
          <p>GRÊMIO FOOT-BALL PORTO ALEGRENSE</p>
          <p>© 2022 Todos os direitors reservados</p>
        </div>
      </footer>
    </div>
  </body>
</html>
